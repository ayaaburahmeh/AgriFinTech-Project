<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriFinTech - المستشار الزراعي الذكي</title>
    <style>
        :root {
            --primary-green: #065f46;
            --secondary-green: #10b981;
            --bg-light: #f0fdf4;
            --text-dark: #1e293b;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--white);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        header {
            text-align: center;
            border-bottom: 2px solid var(--bg-light);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        header h1 {
            color: var(--primary-green);
            margin: 0;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: bold;
            margin-bottom: 8px;
            color: var(--primary-green);
        }

        input, select {
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 16px;
        }

        .full-width {
            grid-column: span 2;
        }

        button {
            grid-column: span 2;
            background-color: var(--primary-green);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background-color: var(--secondary-green);
        }

        #resultSection {
            margin-top: 40px;
            padding: 20px;
            border-radius: 10px;
            background-color: #f8fafc;
            border-right: 6px solid var(--primary-green);
            display: none;
        }

        .loading {
            text-align: center;
            display: none;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🌱 منصة AgriFinTech</h1>
        <p>نظام دعم القرار للمزارع الأردني باستخدام الذكاء الاصطناعي</p>
    </header>

    <form id="agriForm" class="form-grid">
        <div class="input-group">
            <label>اسم المزارع:</label>
            <input type="text" id="farmerName" placeholder="مثلاً: أبو كمال" required>
        </div>

        <div class="input-group">
            <label>المحصول:</label>
            <select id="crop">
                <option value="بندورة">بندورة</option>
                <option value="زيتون">زيتون</option>
                <option value="بصل">بصل</option>
            </select>
        </div>

        <div class="input-group">
            <label>المنطقة:</label>
            <select id="city">
                <option value="الأغوار الوسطى">الأغوار الوسطى</option>
                <option value="إربد">إربد</option>
                <option value="المفرق">المفرق</option>
                <option value="عمان">عمان</option>
            </select>
        </div>

        <div class="input-group">
            <label>المساحة (دونم):</label>
            <input type="number" id="area" value="10">
        </div>

        <div class="input-group">
            <label>مبلغ القرض المطللوب (دينار):</label>
            <input type="number" id="loan" value="2000">
        </div>

        <div class="input-group">
            <label>سنوات الخبرة:</label>
            <input type="number" id="exp" value="5">
        </div>

        <button type="submit" id="submitBtn">إصدار التقرير الاستشاري</button>
    </form>

    <div id="loading" class="loading">
        <p>جاري سحب بيانات الطقس والتربة وتحليل الجدوى... ⏳</p>
    </div>

    <div id="resultSection">
        <h3 id="resultHeader"></h3>
        <div id="reportContent" style="white-space: pre-wrap;"></div>
    </div>
</div>

<script>
    document.getElementById('agriForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const loading = document.getElementById('loading');
        const resultSection = document.getElementById('resultSection');
        const submitBtn = document.getElementById('submitBtn');
        const reportContent = document.getElementById('reportContent');

        // 1. إظهار رسالة الانتظار
        loading.style.display = 'block';
        resultSection.style.display = 'none';
        submitBtn.disabled = true;

        // 2. تجميع البيانات من الفورم
        const formData = {
            farmer_name: document.getElementById('farmerName').value,
            crop_name: document.getElementById('crop').value,
            city_name: document.getElementById('city').value,
            land_area: parseInt(document.getElementById('area').value),
            loan_amount: parseInt(document.getElementById('loan').value),
            experience_years: parseInt(document.getElementById('exp').value)
        };

        try {
            // 3. الاتصال بسيرفر Render (استبدلي الرابط أدناه برابطك الحقيقي)
            const response = await fetch('https://ayaaburahmeh-agrifintech-project.hf.space/analyze', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData)
            });

            if (!response.ok) throw new Error('فشل الاتصال بالسيرفر');

            const result = await response.json();

            // 4. عرض النتيجة النهائية
            loading.style.display = 'none';
            resultSection.style.display = 'block';
            document.getElementById('resultHeader').innerText = "📢 التقرير الذكي لـ " + formData.farmer_name;
            reportContent.innerText = result.report;

        } catch (error) {
            loading.style.display = 'none';
            resultSection.style.display = 'block';
            reportContent.innerText = "❌ عذراً، حدث خطأ: " + error.message;
        } finally {
            submitBtn.disabled = false;
        }
    });
</script>

</body>
</html>
